name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Type Check & Dry-run Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Type check
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Dry-run build
        run: npm run build
        env:
          CLOUDFLARE_API_TOKEN: dry-run-no-token-needed
      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true
